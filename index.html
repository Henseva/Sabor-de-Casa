<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor de Casa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style type="text/tailwindcss">
        @layer utilities {
            .font-cursive { font-family: 'Dancing Script', cursive; }
            .cor-fundo { color: #FFF8E1; }
            .bg-fundo { background-color: #FFF8E1; }
            .cor-terracota { color: #B85C38; }
            .cor-marrom { color: #5D4037; }
            .cor-verde { color: #4A6547; }
            .borda-leve { border-color: #E8DCC2; }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#FFF8E1',
                        terracota: '#B85C38',
                        marrom: '#5D4037',
                        verde: '#4A6547',
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-fundo font-sans text-marrom min-h-screen">
    <div class="max-w-md mx-auto min-h-screen relative">
        <!-- Barra superior -->
        <div class="px-6 py-3 flex justify-between items-center text-xs opacity-80">
            <span>9:41</span>
            <div class="flex gap-2">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <!-- Cabeçalho -->
        <header class="px-6 py-4 flex justify-between items-center border-b borda-leve/60">
            <button class="text-marrom text-xl">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="text-center -ml-4">
                <h1 class="font-cursive text-[clamp(1.9rem,5vw,2.3rem)] font-semibold cor-terracota leading-tight">Sabor de Casa</h1>
                <p class="text-sm text-marrom/60 -mt-1">Comida de verdade</p>
            </div>
            <button class="text-marrom text-xl">
                <i class="fa-solid fa-bell"></i>
            </button>
        </header>

        <!-- Conteúdo principal -->
        <main class="px-6 pt-8 pb-20">
            <!-- Texto de saudação - EXATAMENTE igual -->
            <section class="mb-8 space-y-4">
                <h2 class="text-lg font-normal">Bom dia, Chef! 👋</h2>
                <p class="text-lg font-normal">Que bom ter você aqui!</p>
                <p class="text-lg font-normal leading-relaxed">Comida de verdade ❤️ feita com amor,<br>como em casa.</p>
            </section>

            <!-- Card "Feito com amor" -->
            <section class="bg-[#FFF9E8] rounded-xl p-5 border borda-leve shadow-sm mb-10">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="font-cursive text-[clamp(1.4rem,4vw,1.7rem)] cor-terracota leading-tight">
                            Feito com amor pra<br>você!
                        </p>
                        <i class="fa-solid fa-heart cor-terracota text-lg mt-2"></i>
                    </div>
                    <img src="https://picsum.photos/id/10/140/110" alt="Prato" class="rounded-lg w-32 h-28 object-cover">
                </div>
            </section>

            <!-- Categorias -->
            <section>
                <div class="flex justify-between items-center mb-7">
                    <h3 class="text-xl font-medium">Categorias</h3>
                    <a href="#" class="text-base cor-verde">Ver todas</a>
                </div>
                <div class="grid grid-cols-4 text-center items-start">
                    <div class="flex flex-col items-center gap-2">
                        <i class="fa-solid fa-utensils cor-verde text-2xl"></i>
                        <span class="text-base">Pratos</span>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <i class="fa-solid fa-basket-shopping cor-verde text-2xl"></i>
                        <span class="text-base">Marmitas</span>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <span class="text-base">Lanches</span>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <i class="fa-solid fa-martini-glass cor-verde text-2xl"></i>
                        <span class="text-base">Bebidas</span>
                    </div>
                </div>
            </section>
        </main>

        <!-- Navegação inferior - IDÊNTICA -->
        <nav class="fixed bottom-0 left-0 right-0 bg-fundo border-t borda-leve/60 px-8 py-4 flex justify-between items-center">
            <button class="flex flex-col items-center gap-1 cor-verde">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-xs">Início</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-marrom/70">
                <i class="fa-solid fa-magnifying-glass text-lg"></i>
                <span class="text-xs">Buscar</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-marrom/70">
                <i class="fa-solid fa-basket-shopping text-lg"></i>
                <span class="text-xs">Pedidos</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-marrom/70">
                <i class="fa-solid fa-heart text-lg"></i>
                <span class="text-xs">Favoritos</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-marrom/70">
                <i class="fa-solid fa-user text-lg"></i>
                <span class="text-xs">Conta</span>
            </button>
        </nav>
    </div>
</body>
</html>
