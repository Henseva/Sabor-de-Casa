<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor de Casa - Marmitas Artesanais</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F5F0E6;
            color: #3C1E0A;
            margin: 0;
            padding: 0;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .artisan-texture {
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        creme: '#F5F0E6',
                        terracota: '#D2691E',
                        oliva: '#556B2F',
                        cafe: '#3C1E0A',
                    }
                }
            }
        }
    </script>
</head>
<body class="artisan-texture">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <p class="font-serif italic text-cafe animate-pulse">Preparando sua cozinha...</p>
        </div>
    </div>

    <script type="text/babel">
        const { Home, Search, ClipboardList, Heart, Bell, User, Plus, Star, ChevronRight } = lucide;

        const App = () => {
            const categorias = [
                { id: 1, nome: 'Marmitas', icone: '🍲' },
                { id: 2, nome: 'Sucos', icone: '🍹' },
                { id: 3, nome: 'Saudável', icone: '🥗' },
                { id: 4, nome: 'Doces', icone: '🍰' },
            ];

            const pratos = [
                {
                    id: 1,
                    nome: 'Feijoada Completa',
                    desc: 'Arroz, feijão preto, carnes nobres e couve.',
                    preco: '28,90',
                    rating: 4.9,
                    tag: 'Popular',
                    img: 'https://images.unsplash.com/photo-1590666012393-0450134803e0?auto=format&fit=crop&q=80&w=400'
                },
                {
                    id: 2,
                    nome: 'Frango com Quiabo',
                    desc: 'Frango caipira, quiabo fresquinho e angu.',
                    preco: '26,50',
                    rating: 4.8,
                    tag: 'Caseiro',
                    img: 'https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&q=80&w=400'
                }
            ];

            return (
                <div className="max-w-md mx-auto min-h-screen relative pb-32">
                    <header className="p-6 flex justify-between items-center bg-creme/80 backdrop-blur-md sticky top-0 z-50">
                        <div>
                            <p className="text-[10px] font-bold text-oliva/60 uppercase tracking-widest">Sabor de Casa</p>
                            <h1 className="font-serif text-2xl font-bold text-cafe italic">Olá, Chef! 👋</h1>
                        </div>
                        <div className="flex gap-2">
                            <div className="p-2 bg-white rounded-full shadow-sm"><Bell size={20} className="text-oliva" /></div>
                            <div className="p-2 bg-white rounded-full shadow-sm border border-terracota/20"><User size={20} className="text-terracota" /></div>
                        </div>
                    </header>

                    <main className="px-6 space-y-8">
                        <section className="relative h-44 rounded-[2rem] overflow-hidden shadow-lg">
                            <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?auto=format&fit=crop&q=80&w=600" className="absolute inset-0 w-full h-full object-cover" />
                            <div className="absolute inset-0 bg-black/30 flex flex-col justify-center p-6">
                                <h2 className="text-white font-serif text-xl italic leading-tight">Comida caseira feita<br/>com carinho!</h2>
                            </div>
                        </section>

                        <section>
                            <h3 className="text-lg font-serif font-bold text-cafe mb-4">Categorias</h3>
                            <div className="flex gap-4 overflow-x-auto no-scrollbar">
                                {categorias.map(cat => (
                                    <div key={cat.id} className="flex flex-col items-center min-w-[70px] gap-2">
                                        <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-xl shadow-sm border border-oliva/5">
                                            {cat.icone}
                                        </div>
                                        <span className="text-[10px] font-bold text-cafe/60 uppercase">{cat.nome}</span>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="space-y-4">
                            <h3 className="text-lg font-serif font-bold text-cafe italic">Pratos do Dia</h3>
                            {pratos.map(prato => (
                                <div key={prato.id} className="bg-white rounded-[2rem] p-3 shadow-sm flex gap-4 items-center relative border border-oliva/5">
                                    <img src={prato.img} className="w-20 h-20 rounded-2xl object-cover" />
                                    <div className="flex-1">
                                        <h4 className="font-bold text-cafe text-sm">{prato.nome}</h4>
                                        <p className="text-terracota font-bold text-sm">R$ {prato.preco}</p>
                                        <div className="flex items-center gap-1 text-terracota mt-1">
                                            <Star size={10} fill="currentColor" />
                                            <span className="text-[10px] font-bold">{prato.rating}</span>
                                        </div>
                                    </div>
                                    <button className="bg-terracota text-white p-2 rounded-xl mr-2"><Plus size={20} /></button>
                                </div>
                            ))}
                        </section>
                    </main>

                    <nav className="fixed bottom-6 left-6 right-6 bg-cafe text-creme rounded-full p-2 flex justify-between items-center shadow-2xl">
                        <div className="bg-terracota p-3 rounded-full"><Home size={20} /></div>
                        <Search size={20} className="opacity-40" />
                        <ClipboardList size={20} className="opacity-40" />
                        <Heart size={20} className="opacity-40" />
                        <div className="w-8 h-8 rounded-full bg-oliva/30"></div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
