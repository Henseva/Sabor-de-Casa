<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sabor de Casa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* TOKENS */
:root{
  --bg:#F5EFE0;
  --green:#5A6B3C;
  --green-dark:#3E4A2B;
  --orange:#C35A1E;
  --text:#2E2E2E;
  --muted:#777;
}

/* BODY */
body{
  background: radial-gradient(circle at top,#1f2a18,#0b0f09);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Inter',sans-serif;
}

/* PHONE */
.phone{
  width:360px;
  height:720px;
  background:var(--bg);
  border-radius:32px;
  overflow:hidden;
  position:relative;
  box-shadow:0 40px 80px rgba(0,0,0,.6);
}

/* SCREEN */
.screen{
  position:absolute;
  inset:0;
  padding:20px;
  display:none;
  animation:fade .3s;
}

.screen.active{
  display:block;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:22px;
  color:var(--green-dark);
}

/* BANNER */
.banner{
  margin-top:20px;
  padding:20px;
  border-radius:24px;
  color:#fff;
  background:linear-gradient(135deg,#6c7f47,#3f4c2a);
}

/* GRID */
.grid{
  display:flex;
  gap:12px;
  margin-top:15px;
}

.card{
  flex:1;
  background:#fff;
  padding:12px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

/* IMAGE */
.image{
  height:90px;
  border-radius:16px;
  background:linear-gradient(145deg,#d6d6d6,#bcbcbc);
}

/* BUTTON */
.btn{
  width:100%;
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:16px;
  background:var(--orange);
  color:#fff;
  font-weight:600;
}

/* NAV */
.nav{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:12px;
  background:#fff;
  display:flex;
  justify-content:space-around;
}

/* LIST */
.item{
  background:#fff;
  padding:12px;
  border-radius:14px;
  margin-top:10px;
}

/* TITLE */
.title{
  margin-top:10px;
  font-weight:600;
}

/* PRICE */
.price{
  margin-top:5px;
  font-weight:600;
}

</style>
</head>

<body>

<div class="phone">

<!-- HOME -->
<div class="screen active" id="home">

  <div class="header">
    ☰
    <div class="logo">Sabor de Casa</div>
    🔔
  </div>

  <div class="banner">
    Comida caseira feita com carinho
  </div>

  <div class="grid">
    <div class="card" onclick="go('detalhe')">
      <div class="image"></div>
      <div class="price">R$ 26,90</div>
    </div>

    <div class="card" onclick="go('detalhe')">
      <div class="image"></div>
      <div class="price">R$ 28,90</div>
    </div>
  </div>

  <div class="banner">
    Monte sua marmita
    <button class="btn">Montar agora</button>
  </div>

</div>

<!-- DETALHE -->
<div class="screen" id="detalhe">

  <div class="title">Frango Grelhado</div>

  <div class="image" style="height:160px;margin-top:10px;"></div>

  <div class="price">R$ 24,90</div>

  <button class="btn">Adicionar ao carrinho</button>

</div>

<!-- PEDIDOS -->
<div class="screen" id="pedidos">

  <div class="title">Pedidos</div>

  <div class="item">
    Em preparo<br>
    20-30 min
  </div>

</div>

<!-- FAVORITOS -->
<div class="screen" id="favoritos">

  <div class="title">Favoritos</div>

  <div class="item">Frango - R$ 24,90</div>
  <div class="item">Lasanha - R$ 28,90</div>

</div>

<!-- NAV -->
<div class="nav">
  <span onclick="go('home')">🏠</span>
  <span onclick="go('home')">🔍</span>
  <span onclick="go('pedidos')">🛒</span>
  <span onclick="go('favoritos')">❤️</span>
  <span>👤</span>
</div>

</div>

<script>
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}
</script>

</body>
</html>
